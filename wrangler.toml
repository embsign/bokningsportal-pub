name = "bokningsportal"
compatibility_date = "2026-04-14"
pages_build_output_dir = "frontend/dist"
minify = true

# Lokalt + CLI; CI skriver om binding med rätt database_id / kv_id vid deploy.
[[d1_databases]]
binding = "DB"
database_name = "booking-prod"
database_id = "00000000-0000-0000-0000-000000000001"

# Kiosk last_seen (v1:ls:*) och poll-auth-cache (v1:poll:*). Lokalt: placeholder-id.
[[kv_namespaces]]
binding = "KIOSK_EDGE_KV"
id = "00000000-0000-0000-0000-000000000002"

# Misslyckade RFID-försök, per-IP-backoff, globalt "under attack"-läge (Turnstile).
# Separat namespace från KIOSK_EDGE_KV; byt till riktiga id:n vid produktion.
[[kv_namespaces]]
binding = "RFID_ABUSE_KV"
id = "00000000-0000-0000-0000-000000000003"
preview_id = "00000000-0000-0000-0000-000000000003"

# Privat R2-bucket med Android-APK:er, nycklar: bokningsportal-kiosk-<version>.apk
[[r2_buckets]]
binding = "ANDROID_APK_R2"
bucket_name = "bokningsportalandroid"
